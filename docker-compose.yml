volumes:
  sqlite_data:
    driver: local

services:
  feedback_bot:
    container_name: "RuItUnion.FeedbackBot.App"
    image: ghcr.io/ruitunion-org/feedback-bot:local
    build:
      context: .
      dockerfile: RuItUnion.FeedbackBot/Dockerfile
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1 
      interval: 30s
      timeout: 10s
    env_file:
      - path: feedback_bot.env
        required: true
    environment:
      ConnectionStrings__RuItUnion-FeedbackBot-Database: "Data Source=/app/data/feedback_bot.db"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18889"
      OTEL_SERVICE_NAME: "RuItUnion-FeedbackBot"
    restart: always
    volumes:
     - "sqlite_data:/app/data"
    deploy:
      resources:
        limits:
          memory: 256m

  dashboard:
    container_name: "RuItUnion.FeedbackBot.Dashboard"
    image: "mcr.microsoft.com/dotnet/aspire-dashboard:9"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "false"
      Dashboard__ApplicationName: "RuItUnion.FeedbackBot"
    ports:
    - target: 18888
      published: 18888
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
